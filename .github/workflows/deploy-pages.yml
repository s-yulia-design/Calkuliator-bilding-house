name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm install

      - run: npm run build -w client
        env:
          GITHUB_PAGES: 'true'

      - name: Prepare static files
        run: |
          touch client/dist/.nojekyll
          cp client/dist/index.html client/dist/404.html

      # Публикуем сборку в корень main — так сайт открывается
      # даже если в Settings выбран «Deploy from a branch» → main → /
      - name: Publish site to repository root
        run: |
          rm -rf assets
          rm -f index.html 404.html .nojekyll favicon.svg icons.svg \
            manifest.webmanifest registerSW.js sw.js workbox-*.js
          cp -r client/dist/assets ./assets
          cp client/dist/index.html client/dist/404.html client/dist/.nojekyll ./
          cp client/dist/favicon.svg client/dist/icons.svg \
            client/dist/manifest.webmanifest client/dist/registerSW.js client/dist/sw.js ./
          cp client/dist/workbox-*.js ./
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets index.html 404.html .nojekyll favicon.svg icons.svg \
            manifest.webmanifest registerSW.js sw.js workbox-*.js
          if git diff --staged --quiet; then
            echo "Site files unchanged"
          else
            git commit -m "deploy: publish static site for GitHub Pages [skip ci]"
            git push
          fi

      - name: Enable GitHub Actions for Pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            gh api --method PUT "repos/${{ github.repository }}/pages" -f build_type=workflow
          else
            gh api --method POST "repos/${{ github.repository }}/pages" -f build_type=workflow
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Publish gh-pages branch
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
          force_orphan: true
